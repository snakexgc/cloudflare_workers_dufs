name: Deploy Dufs R2 Worker

on:
  pull_request:
    paths:
      - assets/**
      - workers/dufs-r2-worker/**
      - .github/workflows/deploy-dufs-r2.yml
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dufs-r2-production
  # Do not interrupt an in-progress Durable Object migration or deployment.
  cancel-in-progress: false

env:
  WRANGLER_VERSION: 4.104.0

defaults:
  run:
    shell: bash
    # Important: the repository root has a static-assets wrangler.jsonc.
    # Every Wrangler command for this Worker must run from this module dir.
    working-directory: workers/dufs-r2-worker

jobs:
  validate:
    name: Validate Worker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust and the WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run Rust tests
        run: cargo test --locked

      - name: Check the WASM target
        run: cargo check --locked --target wasm32-unknown-unknown

  deploy:
    name: Deploy Production Worker
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust and the WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Verify Worker Wrangler config
        run: |
          set -euo pipefail
          echo "Wrangler working directory: $PWD"
          test "$(basename "$PWD")" = "dufs-r2-worker"
          test -f wrangler.toml
          grep -q '^main = "build/index.js"$' wrangler.toml
          grep -q '^\[\[r2_buckets\]\]' wrangler.toml

      - name: Read deployment config
        id: config
        run: |
          set -euo pipefail
          worker_name="$(awk -F '"' '/^[[:space:]]*name[[:space:]]*=/ { print $2; exit }' wrangler.toml)"
          bucket_name="$(awk -F '"' '/^[[:space:]]*bucket_name[[:space:]]*=/ { print $2; exit }' wrangler.toml)"
          : "${worker_name:?Could not read Worker name from wrangler.toml.}"
          : "${bucket_name:?Could not read bucket_name from wrangler.toml.}"
          {
            echo "worker_name=$worker_name"
            echo "bucket_name=$bucket_name"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure the configured R2 bucket exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          : "${CLOUDFLARE_API_TOKEN:?Set the CLOUDFLARE_API_TOKEN GitHub Actions secret.}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Set the CLOUDFLARE_ACCOUNT_ID GitHub Actions variable.}"
          bucket_name="${{ steps.config.outputs.bucket_name }}"
          if npx --yes "wrangler@${WRANGLER_VERSION}" r2 bucket info "$bucket_name" --config ./wrangler.toml >/dev/null; then
            echo "Using existing R2 bucket: $bucket_name"
          else
            echo "Creating R2 bucket: $bucket_name"
            npx --yes "wrangler@${WRANGLER_VERSION}" r2 bucket create "$bucket_name" --config ./wrangler.toml
          fi

      - name: Detect deployment type
        id: deploy_type
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          worker_name="${{ steps.config.outputs.worker_name }}"
          if npx --yes "wrangler@${WRANGLER_VERSION}" deployments list --name "$worker_name" --config ./wrangler.toml >/dev/null 2>&1; then
            echo "mode=upgrade" >> "$GITHUB_OUTPUT"
            echo "Deploy mode: upgrade existing Worker $worker_name"
          else
            echo "mode=fresh" >> "$GITHUB_OUTPUT"
            echo "Deploy mode: fresh Worker $worker_name"
          fi

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          DUFS_USERNAME: ${{ secrets.DUFS_USERNAME }}
          DUFS_PASSWORD: ${{ secrets.DUFS_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CLOUDFLARE_API_TOKEN:?Set the CLOUDFLARE_API_TOKEN GitHub Actions secret.}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Set the CLOUDFLARE_ACCOUNT_ID GitHub Actions variable.}"
          : "${DUFS_USERNAME:?Set the DUFS_USERNAME GitHub Actions secret.}"
          : "${DUFS_PASSWORD:?Set the DUFS_PASSWORD GitHub Actions secret.}"
          secret_file="${RUNNER_TEMP}/dufs-r2-worker-secrets.json"
          trap 'rm -f "$secret_file"' EXIT
          SECRET_FILE="$secret_file" node <<'NODE'
          const fs = require("node:fs");
          fs.writeFileSync(
            process.env.SECRET_FILE,
            JSON.stringify({
              DUFS_USERNAME: process.env.DUFS_USERNAME,
              DUFS_PASSWORD: process.env.DUFS_PASSWORD,
            }),
            { mode: 0o600 },
          );
          NODE
          npx --yes "wrangler@${WRANGLER_VERSION}" deploy \
            --config ./wrangler.toml \
            --keep-vars \
            --secrets-file "$secret_file" \
            --message "GitHub Actions ${GITHUB_SHA} (${{ steps.deploy_type.outputs.mode }})"
